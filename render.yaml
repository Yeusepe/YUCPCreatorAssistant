# Render Blueprint for YUCP Creator Assistant
# Single instance: API + Discord bot run together
# See docs/RENDER_DEPLOYMENT.md for setup instructions

services:
  - type: web
    runtime: node
    name: yucp
    buildCommand: bun install --frozen-lockfile
    startCommand: bun run start:all
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: INFISICAL_ENV
        value: prod
      - key: INFISICAL_PROJECT_ID
        sync: false
      - key: INFISICAL_CLIENT_ID
        sync: false
      - key: INFISICAL_CLIENT_SECRET
        sync: false
      - key: INFISICAL_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: CONVEX_URL
        sync: false
      - key: CONVEX_API_SECRET
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: GUMROAD_CLIENT_ID
        sync: false
      - key: GUMROAD_CLIENT_SECRET
        sync: false
      - key: JINXXY_API_KEY
        sync: false
      - key: JINXXY_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DRAGONFLY_URI
        sync: false
