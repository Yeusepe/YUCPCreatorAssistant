# Render Blueprint for YUCP Creator Assistant
# Single instance: API + Discord bot run together
# See docs/RENDER_DEPLOYMENT.md for setup instructions

services:
  - type: web
    runtime: node
    name: yucp
    buildCommand: bun install --frozen-lockfile && npx convex codegen
    buildFilter:
      paths:
        - apps/**
        - packages/**
        - convex/**
        - package.json
        - bun.lock
        - bun.lockb
    startCommand: bun run start:all
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: INFISICAL_ENV
        value: prod
      # Infisical connection (all other secrets come from Infisical prod)
      - key: INFISICAL_PROJECT_ID
        sync: false
      - key: INFISICAL_CLIENT_ID
        sync: false
      - key: INFISICAL_CLIENT_SECRET
        sync: false
      - key: INFISICAL_URL
        sync: false
      # Build-time only: convex codegen runs before app starts (no Infisical access)
      - key: CONVEX_URL
        sync: false
      - key: CONVEX_DEPLOY_KEY
        sync: false
