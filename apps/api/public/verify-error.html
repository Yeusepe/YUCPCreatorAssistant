<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="__API_BASE__/Icons/favicon.ico" type="image/x-icon">
    <title>Verification Failed | Creator Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./tokens.css">
    <link rel="stylesheet" href="./loading.css">
    <style>
        

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            position: relative;
            padding: 1.25rem 1rem;
            box-sizing: border-box;
        }

        @media (min-width: 640px) {
            body { padding: 2rem 1.5rem; }
        }
        @media (min-width: 1024px) {
            body { padding: 3rem 2rem; }
        }

        h1 {
            font-family: "Plus Jakarta Sans", sans-serif;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #ffffff;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #page-content {
            opacity: 0;
            transition: opacity 0.3s ease 0.05s;
        }

        #page-content.is-visible {
            opacity: 1;
        }
    </style>

    <link rel="stylesheet" href="/assets/site/site.css">
    <script type="module" src="/assets/site/site.js"></script>
</head>

<body>
    <!-- Full-page loading overlay (content injected by site.js) -->
    <div id="page-loading-overlay"></div>

    <!-- Cloud background - must live outside #page-content so it initializes before reveal -->
    <div id="bg-canvas-root" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></div>
    <div id="fg-canvas-root" style="position:fixed;inset:0;z-index:1;pointer-events:none;"></div>

    <div id="page-content">
        <main class="text-center max-w-2xl w-full px-4 sm:px-6 relative z-10">
            <div class="mb-8 fade-up" style="animation-delay: 0.2s">
                <svg class="w-24 h-24 mx-auto text-[#c53030]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                    </path>
                </svg>
            </div>
            <h1 class="text-4xl sm:text-5xl lg:text-6xl text-[#ffffff] mb-6 fade-up" style="animation-delay: 0.3s">
                Something went wrong
            </h1>
            <p id="error-msg" class="text-lg sm:text-xl md:text-2xl text-[rgba(255,255,255,0.85)] mb-10 leading-relaxed fade-up"
                style="animation-delay: 0.5s">
                Verification could not be completed.
            </p>
            <div class="fade-up" style="animation-delay: 0.7s">
                <a id="return-btn" href="#"
                    class="action-btn inline-block w-full sm:w-auto px-8 py-4 sm:px-12 sm:py-5 rounded-full text-lg sm:text-xl font-black uppercase tracking-widest no-underline">
                    Return to Discord®
                </a>
            </div>
        </main>
        <script>
            (function () {
                const params = new URLSearchParams(window.location.search);
                const error = params.get('error');
                const returnTo = params.get('returnTo');
                const btn = document.getElementById('return-btn');
                const errorMsg = document.getElementById('error-msg');

                function getSafeReturnTo(value) {
                    if (!value) return null;
                    try {
                        const url = new URL(value, window.location.origin);
                        const allowedOrigins = new Set([
                            'https://discord.com',
                            'https://ptb.discord.com',
                            'https://canary.discord.com',
                            window.location.origin,
                        ]);
                        if (!['https:', 'http:'].includes(url.protocol)) return null;
                        if (!allowedOrigins.has(url.origin)) return null;
                        return url.toString();
                    } catch {
                        return null;
                    }
                }

                if (error) {
                    const normalized = error
                        .replace(/^link_expired$/i, 'This link has expired')
                        .replace(/^missing_parameters$/i, 'Missing parameters')
                        .replace(/^internal_error$/i, 'An internal error occurred')
                        .replace(/_/g, ' ');
                    errorMsg.textContent = normalized;
                }

                const safeReturnTo = getSafeReturnTo(returnTo);

                if (safeReturnTo) {
                    btn.href = safeReturnTo;
                    btn.textContent = 'Return to Discord®';
                } else {
                    btn.href = '#';
                    btn.textContent = 'Try Again';
                    btn.onclick = function () {
                        window.history.back();
                        return false;
                    };
                }
            })();
        </script>
    </div>

</body>

</html>
