<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Icons/favicon.ico" type="image/x-icon">
    <title>Signing in with Discord | YUCP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./tokens.css">
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            font-family: "Plus Jakarta Sans", sans-serif;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .connect-card {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--discord-blurple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .brand-gradient-btn {
            background: linear-gradient(90deg, var(--accent-sky), #ffeb3b);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
            box-shadow: 0 4px 20px rgba(212, 93, 57, 0.2);
        }

        .brand-gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 93, 57, 0.3);
        }

        .fade-up {
            animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(12px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #5865F2;
            border-radius: 50%;
            animation: page-loading-spin 0.8s linear infinite;
        }
        @keyframes page-loading-spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <!-- ES Module Shims for better browser compatibility -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.12?deps=three@0.160.0,react@18.2.0,react-dom@18.2.0",
            "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?deps=three@0.160.0,react@18.2.0,react-dom@18.2.0,@react-three/fiber@8.15.12",
            "holographic-sticker": "https://esm.sh/holographic-sticker@1.0.4?deps=react@18.2.0,react-dom@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="page-loading-overlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center" style="background-color: var(--bg-color);">
        <img src="Icons/MainLogo.png" alt="YUCP" class="h-10 mb-8" />
        <div class="page-loading-spinner"></div>
        <p class="mt-4" style="color: var(--text-secondary);">Loading...</p>
    </div>
    <div id="page-content" style="display: none;">
    <div id="bg-canvas-root"
        style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -20; pointer-events: none;">
    </div>
    <!-- Playful Background Stickers -->
    <div id="holo-world-0" class="absolute top-32 right-1/4 w-32 opacity-80 sticker pointer-events-auto z-0 h-32"
        style="animation-delay: -1s;"></div>
    <div id="holo-assistant-1" class="absolute bottom-32 left-1/4 w-24 opacity-60 sticker pointer-events-auto z-0 h-24"
        style="animation-delay: -4s;"></div>

    <main class="text-center max-w-md px-6">
        <div class="connect-card rounded-[32px] p-12">
            <div id="loading-state">
                <div class="spinner mx-auto mb-6"></div>
                <h1 class="text-2xl md:text-3xl text-[#ffffff] mb-3 fade-up">
                    Signing in with Discord
                </h1>
                <p class="text-[rgba(255,255,255,0.8)] fade-up">
                    Redirecting you to Discord to authorize...
                </p>
            </div>
            <div id="error-state" class="hidden">
                <svg class="w-16 h-16 mx-auto text-[#c53030] mb-4" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                    </path>
                </svg>
                <h1 class="text-xl text-[#ffffff] mb-3">Sign-in failed</h1>
                <p class="text-[rgba(255,255,255,0.8)] mb-6">Something went wrong. Please try again.</p>
                <a id="retry-btn" href="#"
                    class="brand-gradient-btn inline-block px-8 py-4 rounded-full text-[#1a6bff] font-bold uppercase tracking-wider no-underline">
                    Try again
                </a>
            </div>
        </div>
    </main>
    <script type="module">
        // Server-injected values
        const signInUrl = __SIGN_IN_URL__;
        const callbackUrl = __CALLBACK_URL__;

        const loadingEl = document.getElementById('loading-state');
        const errorEl = document.getElementById('error-state');
        const retryBtn = document.getElementById('retry-btn');

        function showError() {
            loadingEl.classList.add('hidden');
            errorEl.classList.remove('hidden');
            retryBtn.href = callbackUrl;
        }

        try {
            // Use the Bun API as a same-origin bridge so the browser never has to
            // call Convex auth directly and trip CORS preflight checks.
            window.location.href = signInUrl;
        } catch (err) {
            console.error('[sign-in] Exception:', err);
            showError();
        }
    </script>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useRef, Component } from "react";
        import { createRoot } from "react-dom/client";
        import * as THREE from "three";
        import { Canvas, useFrame } from "@react-three/fiber";
        import { Clouds, Cloud, Sky as SkyImpl } from "@react-three/drei";
        import HolographicSticker from "holographic-sticker";

        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("React Error Boundary caught an error", error, errorInfo); }
            render() { return this.state.hasError ? null : this.props.children; }
        }

        function MovingCloud({ startX, speed, bounds, color, volume, opacity, seed, y, z, growth, fade, segments, concentrate }) {
            const ref = useRef();
            useFrame((state) => {
                if (ref.current) {
                    const elapsed = state.clock.getElapsedTime();
                    const range = 240;
                    let currentX = startX - elapsed * speed;
                    currentX = ((currentX + 120) % range + range) % range - 120;
                    ref.current.position.x = currentX;
                }
            });
            return (
                <group ref={ref} position={[startX, y, z]}>
                    <Cloud bounds={bounds} color={color} volume={volume} opacity={opacity} seed={seed} growth={growth} fade={fade} segments={segments} concentrate={concentrate} position={[0, 0, 0]} />
                </group>
            );
        }

        function BackgroundSky() {
            return (
                <React.Fragment>
                    <SkyImpl sunPosition={[100, 20, 100]} turbidity={0.8} rayleigh={0.5} />
                    <Clouds material={THREE.MeshLambertMaterial} limit={4000} range={20}>
                        <MovingCloud startX={0} speed={1.5} bounds={[25, 6, 15]} color="#ffffff" volume={15} opacity={0.6} seed={1} y={0} z={-10} growth={4} fade={10} segments={20} />
                        <MovingCloud startX={30} speed={2.2} bounds={[10, 4, 10]} color="#eaebff" volume={6} opacity={0.4} seed={2} y={8} z={-20} growth={8} fade={20} segments={10} />
                        <MovingCloud startX={-20} speed={0.5} bounds={[60, 5, 40]} color="#d3e2ff" volume={40} opacity={0.9} seed={3} y={-5} z={-35} growth={2} fade={30} segments={40} concentrate="outside" />
                        <MovingCloud startX={-45} speed={1.0} bounds={[30, 20, 30]} color="#fdfdfd" volume={35} opacity={0.7} seed={5} y={5} z={-25} growth={6} fade={15} segments={35} concentrate="random" />
                    </Clouds>
                </React.Fragment>
            )
        }

        function ForegroundSky() {
            return (
                <React.Fragment>
                    <Clouds material={THREE.MeshLambertMaterial} limit={4000} range={20}>
                        <MovingCloud startX={45} speed={2.8} bounds={[10, 10, 5]} color="#f0f0f0" volume={12} opacity={0.8} seed={4} y={2} z={10} growth={15} fade={5} segments={15} concentrate="inside" />
                        <MovingCloud startX={15} speed={3.5} bounds={[20, 5, 8]} color="#ffffff" volume={8} opacity={0.6} seed={6} y={-2} z={5} growth={5} fade={25} segments={12} />
                    </Clouds>
                </React.Fragment>
            )
        }

        function BackgroundApp() {
            return (
                <ErrorBoundary>
                    <Canvas camera={{ position: [0, -5, 15], fov: 60 }} gl={{ alpha: false }}>
                        <BackgroundSky />
                        <ambientLight intensity={Math.PI / 1.5} />
                        <directionalLight position={[10, 20, 10]} intensity={1.5} color="#ffffff" />
                        <spotLight position={[-20, 0, 10]} color="#ffdddd" angle={0.8} decay={0} penumbra={1} intensity={10} />
                    </Canvas>
                </ErrorBoundary>
            )
        }

        function ForegroundApp() {
            return (
                <ErrorBoundary>
                    <Canvas camera={{ position: [0, -5, 15], fov: 60 }} gl={{ alpha: true }} style={{ pointerEvents: 'none' }}>
                        <ForegroundSky />
                        <ambientLight intensity={Math.PI / 1.5} />
                        <directionalLight position={[10, 20, 10]} intensity={1.5} color="#ffffff" />
                    </Canvas>
                </ErrorBoundary>
            )
        }

        const bgRoot = createRoot(document.getElementById('bg-canvas-root'));
        bgRoot.render(<BackgroundApp />);

        // Holographic Stickers
        const HoloWrapper = ({ src, alt }) => (
            <HolographicSticker.Root>
                <HolographicSticker.Scene>
                    <HolographicSticker.Card className="w-full h-full rounded-2xl bg-transparent border-none overflow-visible">
                        <HolographicSticker.ImageLayer src={src} alt={alt} objectFit="contain" />
                        <HolographicSticker.Pattern
                            maskUrl={src}
                            maskSize="contain"
                            textureUrl="https://assets.codepen.io/605876/figma-texture.png"
                            textureSize="300px"
                            mixBlendMode="hard-light"
                            opacity={0.6}>
                            <HolographicSticker.Refraction intensity={2.5} />
                        </HolographicSticker.Pattern>
                    </HolographicSticker.Card>
                </HolographicSticker.Scene>
            </HolographicSticker.Root>
        );

        const root_holo_world_0 = document.getElementById("holo-world-0");
        if (root_holo_world_0) {
            createRoot(root_holo_world_0).render(<HoloWrapper src="./Icons/World.png" alt="World" />);
        }
        const root_holo_assistant_1 = document.getElementById("holo-assistant-1");
        if (root_holo_assistant_1) {
            createRoot(root_holo_assistant_1).render(<HoloWrapper src="./Icons/Assistant.png" alt="Assistant" />);
        }

        (function hideLoading() {
            const overlay = document.getElementById('page-loading-overlay');
            const content = document.getElementById('page-content');
            if (overlay) overlay.style.display = 'none';
            if (content) content.style.display = '';
        })();
    </script>
</body>

</html>
