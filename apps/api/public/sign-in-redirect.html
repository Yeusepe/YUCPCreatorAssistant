<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Icons/favicon.ico" type="image/x-icon">
    <title>Signing in with Discord® | Creator Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./tokens.css">
    <link rel="stylesheet" href="./loading.css">
    <style>
        

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 1rem;
            box-sizing: border-box;
        }

        h1 {
            font-family: "Plus Jakarta Sans", sans-serif;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .connect-card {
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--discord-blurple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .brand-gradient-btn {
            background: linear-gradient(90deg, var(--accent-sky), #ffeb3b);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
            box-shadow: 0 4px 20px rgba(212, 93, 57, 0.2);
        }

        .brand-gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 93, 57, 0.3);
        }

        .fade-up {
            animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(12px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #page-content {
            opacity: 0;
            transition: opacity 0.3s ease 0.05s;
        }

        #page-content.is-visible {
            opacity: 1;
        }
    </style>

    <link rel="stylesheet" href="/assets/site/site.css">
    <script type="module" src="/assets/site/site.js"></script>
</head>

<body>
    <!-- Full-page loading overlay (content injected by site.js) -->
    <div id="page-loading-overlay"></div>
    </div>
    <div id="page-content" style="display: none;">
        <div id="bg-canvas-root"
            style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -20; pointer-events: none;">
        </div>
        <!-- Playful Background Stickers -->
        <div id="holo-world-0" class="absolute top-32 right-1/4 w-32 opacity-80 sticker pointer-events-auto z-0 h-32 hidden sm:block"
            style="animation-delay: -1s;"></div>
        <div id="holo-assistant-1"
            class="absolute bottom-32 left-1/4 w-24 opacity-60 sticker pointer-events-auto z-0 h-24 hidden sm:block"
            style="animation-delay: -4s;"></div>

        <main class="text-center max-w-md w-full px-4 sm:px-6">
            <div class="connect-card rounded-[32px] p-8 sm:p-12">
                <div id="loading-state">
                    <div class="spinner mx-auto mb-6"></div>
                    <h1 class="text-2xl md:text-3xl text-[#ffffff] mb-3 fade-up">
                        Signing in with Discord®
                    </h1>
                    <p class="text-[rgba(255,255,255,0.8)] fade-up">
                        Redirecting you to Discord® to authorize...
                    </p>
                </div>
                <div id="error-state" class="hidden">
                    <svg class="w-16 h-16 mx-auto text-[#c53030] mb-4" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                    <h1 class="text-xl text-[#ffffff] mb-3">Sign-in failed</h1>
                    <p class="text-[rgba(255,255,255,0.8)] mb-6">Something went wrong. Please try again.</p>
                    <a id="retry-btn" href="#"
                        class="brand-gradient-btn inline-block w-full sm:w-auto px-8 py-4 rounded-full text-[#1a6bff] font-bold uppercase tracking-wider no-underline text-center">
                        Try again
                    </a>
                </div>
            </div>
        </main>
        <script type="module">
            // Server-injected values
            const signInUrl = __SIGN_IN_URL__;
            const callbackUrl = __CALLBACK_URL__;

            const loadingEl = document.getElementById('loading-state');
            const errorEl = document.getElementById('error-state');
            const retryBtn = document.getElementById('retry-btn');

            function redirectToExpiredLinkError() {
                const errorUrl = new URL('/verify-error', signInUrl);
                errorUrl.searchParams.set('error', 'link_expired');
                window.location.replace(errorUrl.toString());
            }

            function showError() {
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
                retryBtn.href = callbackUrl;
            }

            async function exchangeBootstrapTokens() {
                const hash = new URLSearchParams(window.location.hash.replace(/^#/, ''));
                const setupToken = hash.get('s');
                const connectToken = hash.get('token');
                if (!setupToken && !connectToken) return false;

                const bootstrapUrl = new URL('/api/connect/bootstrap', signInUrl);
                const response = await fetch(bootstrapUrl.toString(), {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'content-type': 'application/json',
                    },
                    body: JSON.stringify({
                        setupToken: setupToken || undefined,
                        connectToken: connectToken || undefined,
                    }),
                });

                if (!response.ok) {
                    redirectToExpiredLinkError();
                    return true;
                }

                window.history.replaceState({}, '', window.location.pathname + window.location.search);
                window.location.reload();
                return true;
            }

            async function startSignIn() {
                if (await exchangeBootstrapTokens()) return;
                window.location.href = signInUrl;
            }

            startSignIn().catch((err) => {
                console.error('[sign-in] Exception:', err);
                showError();
            });
        </script>
    </div>

</body>

</html>
