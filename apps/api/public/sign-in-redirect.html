<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in with Discord | YUCP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://db.onlinewebfonts.com/c/5cae74f63bd48d24d5abdddb3af09a50?family=Airbnb+Cereal+App+Black" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f6efee;
            --text-primary: #7a7a9f;
            --text-secondary: #5e5e80;
            --accent-orange: #d45d39;
            --accent-blue: #224285;
            --discord-blurple: #5865F2;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            font-family: "Airbnb Cereal App Black", sans-serif;
            font-weight: 800;
            letter-spacing: -0.04em;
        }
        .connect-card {
            background: #fff;
            border: 1px solid #e0d6d4;
            box-shadow: 0 20px 50px rgba(34, 66, 133, 0.05);
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e0d6d4;
            border-top-color: var(--discord-blurple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .brand-gradient-btn {
            background: linear-gradient(90deg, var(--accent-orange), #f0cc60);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
            box-shadow: 0 4px 20px rgba(212, 93, 57, 0.2);
        }
        .brand-gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 93, 57, 0.3);
        }
        .fade-up {
            animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(12px);
        }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <main class="text-center max-w-md px-6">
        <div class="connect-card rounded-[32px] p-12">
            <div id="loading-state">
                <div class="spinner mx-auto mb-6"></div>
                <h1 class="text-2xl md:text-3xl text-[#224285] mb-3 fade-up">
                    Signing in with Discord
                </h1>
                <p class="text-[#7a7a9f] fade-up">
                    Redirecting you to Discord to authorize...
                </p>
            </div>
            <div id="error-state" class="hidden">
                <svg class="w-16 h-16 mx-auto text-[#c53030] mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                <h1 class="text-xl text-[#224285] mb-3">Sign-in failed</h1>
                <p class="text-[#7a7a9f] mb-6">Something went wrong. Please try again.</p>
                <a id="retry-btn" href="#" class="brand-gradient-btn inline-block px-8 py-4 rounded-full text-[#f6efee] font-bold uppercase tracking-wider no-underline">
                    Try again
                </a>
            </div>
        </div>
    </main>
    <script type="module">
        const baseUrl = __BASE_URL__;
        const callbackUrl = __CALLBACK_URL__;

        const loadingEl = document.getElementById('loading-state');
        const errorEl = document.getElementById('error-state');
        const retryBtn = document.getElementById('retry-btn');

        function showError() {
            loadingEl.classList.add('hidden');
            errorEl.classList.remove('hidden');
            retryBtn.href = callbackUrl;
        }

        try {
            const { createAuthClient } = await import('https://esm.sh/better-auth@1.4.9/client');
            const authClient = createAuthClient({ baseURL: baseUrl });
            const { data, error } = await authClient.signIn.social({
                provider: 'discord',
                callbackURL: callbackUrl,
            });
            if (error) {
                showError();
            } else if (data?.url) {
                window.location.href = data.url;
            } else {
                showError();
            }
        } catch (_) {
            showError();
        }
    </script>
</body>
</html>
