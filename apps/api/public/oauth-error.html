<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Icons/favicon.ico" type="image/x-icon">
    <title>Sign-in Failed | YUCP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/tokens.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 1.25rem;
            margin: 0;
        }

        .error-card {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
            padding: 52px 44px 44px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            animation: card-in 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(18px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1);    }
        }

        /* ── icon ── */
        .icon-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.12);
            border: 1.5px solid rgba(239, 68, 68, 0.28);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            animation: pulse-ring 2.4s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
            50%       { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0.08); }
        }

        .icon-ring svg {
            width: 36px;
            height: 36px;
            color: #EF4444;
        }

        /* ── text ── */
        h1 {
            font-family: "Plus Jakarta Sans", sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.03em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary, #888);
            line-height: 1.6;
            margin-bottom: 0;
        }

        /* ── error detail box ── */
        .detail-box {
            margin-top: 20px;
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.18);
            border-radius: 12px;
            padding: 14px 16px;
            text-align: left;
            display: none;
        }

        .detail-box.visible { display: block; }

        .detail-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #EF4444;
            margin-bottom: 5px;
        }

        .detail-text {
            font-family: 'DM Mono', 'Menlo', 'Consolas', monospace;
            font-size: 0.8rem;
            color: var(--text-secondary, #888);
            word-break: break-word;
            line-height: 1.55;
        }

        /* ── button ── */
        .btn-row {
            margin-top: 28px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 10px 22px;
            border-radius: 100px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: opacity 0.15s, transform 0.15s;
        }

        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: linear-gradient(135deg, #5865F2 0%, #7B83F5 100%);
            color: #fff;
            box-shadow: 0 4px 16px rgba(88, 101, 242, 0.35);
        }

        .btn-primary:hover { opacity: 0.9; }

        .btn-ghost {
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary, #888);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-ghost:hover { background: rgba(255,255,255,0.1); }

        /* ── decorative blobs ── */
        .blobs {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
        }

        .blob-1 {
            width: 380px; height: 380px;
            background: radial-gradient(circle, #EF4444 0%, transparent 70%);
            top: -120px; left: -100px;
        }

        .blob-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #7B83F5 0%, transparent 70%);
            bottom: -80px; right: -60px;
        }
    </style>
</head>

<body>
    <!-- background blobs -->
    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="error-card">
        <!-- icon -->
        <div class="icon-ring">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>

        <h1>Sign-in failed</h1>
        <p class="subtitle">
            Something went wrong during authorization. You can close this tab and try again.
        </p>

        <!-- error detail — shown only when ?error= param is present -->
        <div class="detail-box" id="detail-box">
            <div class="detail-label">Error detail</div>
            <div class="detail-text" id="detail-text"></div>
        </div>

        <div class="btn-row">
            <button class="btn btn-ghost" onclick="window.close()">Close tab</button>
        </div>
    </div>

    <script>
        // Surface the ?error= query param if present
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        if (error) {
            const box = document.getElementById('detail-box');
            const txt = document.getElementById('detail-text');
            txt.textContent = decodeURIComponent(error);
            box.classList.add('visible');
        }
    </script>
</body>

</html>
