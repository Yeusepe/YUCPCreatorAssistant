<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="Icons/favicon.ico" type="image/x-icon">
    <title>Sign in | Creator Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/tokens.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 1.25rem;
            margin: 0;
        }

        .login-card {
            background: rgba(0, 0, 0, 0.30);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 24px 72px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 48px 40px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            animation: card-in 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(18px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── Loading state ───────────────────────────────────────────────── */
        .spinner-ring {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.08);
            border-top-color: var(--discord-blurple);
            border-right-color: rgba(88, 101, 242, 0.4);
            animation: spin 0.75s linear infinite;
            margin: 0 auto 28px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .discord-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: rgba(88, 101, 242, 0.18);
            border: 1px solid rgba(88, 101, 242, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .discord-icon svg {
            width: 26px;
            height: 26px;
            fill: #7289da;
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.04em;
            color: #fff;
            margin: 0 0 10px;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.55);
            margin: 0;
            line-height: 1.55;
        }

        /* Animated dot trail */
        .loading-dots {
            display: inline-flex;
            gap: 5px;
            margin-top: 20px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(88, 101, 242, 0.7);
            animation: dot-pulse 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-pulse {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ── Error state ─────────────────────────────────────────────────── */
        .error-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .error-icon svg {
            width: 26px;
            height: 26px;
            stroke: #f87171;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .error-notice {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: rgba(239, 68, 68, 0.07);
            border: 1px solid rgba(239, 68, 68, 0.18);
            border-radius: 12px;
            padding: 12px 14px;
            margin: 16px 0 24px;
            text-align: left;
        }

        .error-notice svg {
            width: 14px;
            height: 14px;
            stroke: #f87171;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .error-notice p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.55);
            margin: 0;
            line-height: 1.55;
        }

        .retry-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 13px 24px;
            border: none;
            border-radius: 14px;
            background: var(--discord-blurple);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(88, 101, 242, 0.35);
            transition: transform 0.18s, box-shadow 0.18s;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(88, 101, 242, 0.45);
        }

        .retry-btn:active {
            transform: scale(0.98);
            transition-duration: 0.08s;
        }

        .retry-btn svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .hidden { display: none !important; }
    </style>
</head>

<body>
    <main>
        <div class="login-card">
            <!-- Loading state -->
            <div id="loading-state">
                <div class="spinner-ring"></div>
                <h1>Signing in with Discord</h1>
                <p class="subtitle">Redirecting you to authorize…</p>
                <div class="loading-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <!-- Error state -->
            <div id="error-state" class="hidden">
                <div class="error-icon">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
                <h1>Sign-in failed</h1>
                <p class="subtitle">Something went wrong during the authorization flow.</p>
                <div class="error-notice">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <p>The sign-in could not be completed. This can happen if you denied access, the session expired, or there was a network issue. Please try again.</p>
                </div>
                <a id="retry-btn" href="#" class="retry-btn">
                    <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                    Try again
                </a>
            </div>
        </div>
    </main>

    <script type="module">
        // Server-injected values
        const apiBase = __API_BASE__;

        // The cross-domain plugin stores the session under this localStorage key.
        // Key format: `${storagePrefix}_cookie` — prefix defaults to "better-auth".
        const STORAGE_KEY = 'better-auth_cookie';

        const loadingEl = document.getElementById('loading-state');
        const errorEl = document.getElementById('error-state');
        const retryBtn = document.getElementById('retry-btn');

        function showError() {
            loadingEl.classList.add('hidden');
            errorEl.classList.remove('hidden');
            retryBtn.href = window.location.pathname;
        }

        /**
         * Check whether the user has a valid session, using the cross-domain
         * plugin's localStorage token if present (falls back to browser cookie).
         */
        async function checkSession() {
            const storedCookie = localStorage.getItem(STORAGE_KEY) || '';
            const headers = storedCookie ? { 'Better-Auth-Cookie': storedCookie } : {};
            try {
                const res = await fetch(`${apiBase}/api/auth/get-session`, {
                    credentials: 'include',
                    headers,
                });
                if (!res.ok) return null;
                const data = await res.json();
                return data.user ? data : null;
            } catch {
                return null;
            }
        }

        /**
         * After Discord OAuth, Better Auth's cross-domain plugin appends
         * `?ott=<token>` to the callbackURL.  Exchange the one-time token for a
         * session and store it in localStorage so the consent page can send it.
         * Returns true if an OTT was found and exchanged (successfully or not).
         */
        async function exchangeOneTimeToken() {
            const params = new URLSearchParams(window.location.search);
            const ott = params.get('ott');
            if (!ott) return false;

            try {
                const res = await fetch(`${apiBase}/api/auth/cross-domain/one-time-token/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ token: ott }),
                });
                if (res.ok) {
                    // The cross-domain plugin sends the session as a custom header so
                    // it can be stored in localStorage (bypassing cookie restrictions).
                    const setCookie = res.headers.get('set-better-auth-cookie');
                    if (setCookie) {
                        localStorage.setItem(STORAGE_KEY, setCookie);
                    }
                }
            } catch (e) {
                console.error('[oauth-login] OTT exchange failed:', e);
            }

            // Strip the ott token from the URL so it can't be replayed or leaked.
            params.delete('ott');
            const newSearch = params.toString();
            window.history.replaceState(
                {},
                '',
                window.location.pathname + (newSearch ? '?' + newSearch : '')
            );
            return true;
        }

        async function runOAuthLoginFlow() {
            // Step 1 — if returning from Discord OAuth, exchange OTT for session.
            await exchangeOneTimeToken();

            // Step 2 — check whether we now have a session.
            const sessionData = await checkSession();
            if (sessionData?.user) {
                // Signed in: redirect back to the consent page using the signed OAuth
                // params that Better Auth placed on this page's query string.
                // The signed params for loginPage and consentPage are identical, so we
                // can navigate directly without hitting the authorize endpoint again.
                const consentUrl = `${apiBase}/oauth/consent${window.location.search}`;
                window.location.replace(consentUrl);
                return;
            }

            // Step 3 — not signed in: send user to Discord with this page as callback
            // (current URL already carries the signed OAuth params; OTT is stripped).
            const callbackUrl = window.location.href;
            const signInUrl = `${apiBase}/api/auth/sign-in/discord?callbackURL=${encodeURIComponent(callbackUrl)}`;
            window.location.href = signInUrl;
        }

        runOAuthLoginFlow().catch((err) => {
            console.error('[oauth-login] Exception:', err);
            showError();
        });
    </script>
</body>

</html>
