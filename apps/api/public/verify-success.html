<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="__API_BASE__/Icons/favicon.ico" type="image/x-icon">
    <title>Verification Successful | Creator Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./tokens.css">
    <style>
        

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        h1 {
            font-family: "Plus Jakarta Sans", sans-serif;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .success-checkmark {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            position: relative;
            z-index: 10;
        }

        .check-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 1.5s ease-in-out forwards;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }

        .circle-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 1.2s ease-in-out forwards;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #ffffff;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #5865F2;
            border-radius: 50%;
            animation: page-loading-spin 0.8s linear infinite;
        }

        @keyframes page-loading-spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Flash fix ─────────────────────────────────────────────────────── */
        #page-loading-overlay {
            transition: opacity 0.35s ease;
        }

        #page-loading-overlay.is-hiding {
            opacity: 0;
            pointer-events: none;
        }

        #page-content {
            opacity: 0;
            transition: opacity 0.3s ease 0.05s;
        }

        #page-content.is-visible {
            opacity: 1;
        }
    </style>

    <link rel="stylesheet" href="/assets/site/site.css">
    <script type="module" src="/assets/site/site.js"></script>
</head>

<body>
    <div id="page-loading-overlay" class="fixed inset-0 z-[100] flex flex-col items-center justify-center"
        style="background-color: var(--bg-color);">
        <img src="__API_BASE__/Icons/MainLogo.png" alt="Creator Assistant" class="h-10 mb-8" />
        <div class="page-loading-spinner"></div>
        <p class="mt-4" style="color: var(--text-secondary);">Loading...</p>
    </div>
    <div id="page-content" style="display: none;">
        <div id="bg-canvas-root"
            style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -20; pointer-events: none;">
        </div>
        <!-- Playful Background Stickers -->
        <div id="holo-clapstars-0" class="absolute top-20 right-20 w-32 opacity-80 sticker pointer-events-auto z-0 h-32"
            style="animation-delay: -2s;"></div>
        <div id="holo-world-1" class="absolute bottom-20 left-10 w-24 opacity-60 sticker pointer-events-auto z-0 h-24"
            style="animation-delay: -5s;"></div>

        <main class="text-center max-w-2xl px-6 relative z-10">
            <div class="success-checkmark">
                <svg viewBox="0 0 100 100">
                    <circle class="circle-path" cx="50" cy="50" r="45" stroke="#00e676" stroke-width="6" fill="none">
                    </circle>
                    <path class="check-path" d="M30 50 L45 65 L70 35" stroke="#00e676" stroke-width="6" fill="none"
                        stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </div>
            <h1 class="text-5xl md:text-6xl text-[#ffffff] mb-6 fade-up" style="animation-delay: 0.3s">
                You're verified!
            </h1>
            <p class="text-xl md:text-2xl text-[rgba(255,255,255,0.85)] mb-12 leading-relaxed fade-up"
                style="animation-delay: 0.5s">
                Your Discord account has been verified. Your roles will be updated shortly. You can return to Discord
                now.
            </p>
            <div class="fade-up" style="animation-delay: 0.7s">
                <a id="return-btn" href="#"
                    class="action-btn inline-block px-12 py-5 rounded-full text-xl font-black uppercase tracking-widest no-underline">
                    Return to Discord
                </a>
            </div>
            <div id="redirect-msg" class="mt-12 text-sm font-bold uppercase tracking-widest opacity-40 fade-up"
                style="animation-delay: 0.9s">
                Redirecting in 5 seconds...
            </div>
            <div id="close-msg" class="mt-12 text-sm font-bold uppercase tracking-widest opacity-40 fade-up"
                style="animation-delay: 0.9s; display: none;">
                You can close this tab.
            </div>
        </main>
        <script>
            (function () {
                const params = new URLSearchParams(window.location.search);
                const panelToken = params.get('panelToken');
                const returnTo = params.get('returnTo');
                const btn = document.getElementById('return-btn');
                const redirectMsg = document.getElementById('redirect-msg');
                const closeMsg = document.getElementById('close-msg');

                if (panelToken) {
                    fetch('/api/verification/panel/refresh', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ panelToken }),
                    }).catch(() => {});
                }

                function getSafeReturnTo(value) {
                    if (!value) return null;
                    try {
                        const url = new URL(value, window.location.origin);
                        const allowedOrigins = new Set([
                            'https://discord.com',
                            'https://ptb.discord.com',
                            'https://canary.discord.com',
                            window.location.origin,
                        ]);
                        if (!['https:', 'http:'].includes(url.protocol)) return null;
                        if (!allowedOrigins.has(url.origin)) return null;
                        return url.toString();
                    } catch {
                        return null;
                    }
                }

                const safeReturnTo = getSafeReturnTo(returnTo);

                if (safeReturnTo) {
                    btn.href = safeReturnTo;
                    btn.textContent = 'Return to Discord';
                    let count = 5;
                    const interval = setInterval(function () {
                        count--;
                        redirectMsg.textContent = count > 0 ? 'Redirecting in ' + count + ' second' + (count !== 1 ? 's' : '') + '...' : 'Redirecting...';
                        if (count <= 0) {
                            clearInterval(interval);
                            window.location.href = safeReturnTo;
                        }
                    }, 1000);
                } else {
                    btn.href = '#';
                    btn.textContent = 'Close';
                    btn.onclick = function () { window.close(); return false; };
                    redirectMsg.style.display = 'none';
                    closeMsg.style.display = 'block';
                }

                window.addEventListener('load', function () {
                    if (typeof confetti === 'function') {
                        confetti({
                            particleCount: 150,
                            spread: 100,
                            origin: { y: 0.6 },
                            colors: ['#ffeb3b', '#0ea5e9', '#00e676', '#ffffff'],
                            disableForReducedMotion: true
                        });
                    }
                });
            })();
        </script>
    </div>

    <script>
        // Smooth overlay fade: intercepts site.js instant display:none
        (function () {
            var overlay = document.getElementById('page-loading-overlay');
            var content = document.getElementById('page-content');
            if (!overlay) return;
            var observer = new MutationObserver(function () {
                if (overlay.style.display === 'none') {
                    overlay.style.display = '';
                    setTimeout(function() {
                        overlay.classList.add('is-hiding');
                        if (content) {
                        requestAnimationFrame(function () {
                            requestAnimationFrame(function () { content.classList.add('is-visible'); });
                        });
                    }
                    setTimeout(function () { overlay.style.display = 'none'; }, 370);
                    }, 500);
                    observer.disconnect();
                }
            });
            observer.observe(overlay, { attributes: true, attributeFilter: ['style'] });
        })();
    </script>

</body>

</html>
