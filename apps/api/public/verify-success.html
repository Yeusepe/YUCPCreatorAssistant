<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="__API_BASE__/Icons/favicon.ico" type="image/x-icon">
    <title>Verification Successful | Creator Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./tokens.css">
    <link rel="stylesheet" href="./loading.css">
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            position: relative;
            padding: 1.25rem 1rem;
            box-sizing: border-box;
        }

        @media (min-width: 640px) {
            body {
                padding: 2rem 1.5rem;
            }
        }

        @media (min-width: 1024px) {
            body {
                padding: 3rem 2rem;
            }
        }

        h1 {
            font-family: "Plus Jakarta Sans", sans-serif;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .success-checkmark {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            position: relative;
            z-index: 10;
        }

        .check-path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: dash 0.8s ease-out 0.3s forwards;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }

        .circle-path {
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: dash 0.6s ease-out forwards;
        }

        .fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #page-content {
            opacity: 0;
            transition: opacity 0.3s ease 0.05s;
        }

        #page-content.is-visible {
            opacity: 1;
        }
    </style>

    <link rel="stylesheet" href="/assets/site/site.css">
    <script type="module" src="/assets/site/site.js"></script>
</head>

<body>
    <!-- Full-page loading overlay (content injected by site.js) -->
    <div id="page-loading-overlay"></div>

    <!-- Cloud background - must live outside #page-content so it initializes before reveal -->
    <div id="bg-canvas-root" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></div>
    <div id="fg-canvas-root" style="position:fixed;inset:0;z-index:1;pointer-events:none;"></div>

    <div id="page-content">
        <main class="text-center max-w-2xl w-full px-4 sm:px-6 relative z-10">
            <div class="success-checkmark">
                <svg viewBox="0 0 100 100">
                    <circle class="circle-path" cx="50" cy="50" r="45" stroke="#00e676" stroke-width="6" fill="none">
                    </circle>
                    <path class="check-path" d="M30 50 L45 65 L70 35" stroke="#00e676" stroke-width="6" fill="none"
                        stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
            </div>
            <h1 class="text-4xl sm:text-6xl lg:text-7xl text-[#ffffff] mb-6 fade-up" style="animation-delay: 0.3s">
                You're verified!
            </h1>
            <p class="text-lg sm:text-xl md:text-2xl text-[rgba(255,255,255,0.85)] mb-10 leading-relaxed fade-up"
                style="animation-delay: 0.5s">
                Your account has been verified. Your roles will be updated shortly.
            </p>
            <div id="status-msg" class="mt-4 text-sm font-bold uppercase tracking-widest opacity-40 fade-up"
                style="animation-delay: 0.7s">
                You can close this tab.
            </div>
        </main>
        <script>
            (function () {
                const params = new URLSearchParams(window.location.search);
                const panelToken = params.get('panelToken');
                const returnTo = params.get('returnTo');
                const statusMsg = document.getElementById('status-msg');

                if (panelToken) {
                    fetch('/api/verification/panel/refresh', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ panelToken }),
                    }).catch(() => { });
                }

                function getSafeReturnTo(value) {
                    if (!value) return null;
                    try {
                        const url = new URL(value, window.location.origin);
                        const allowedOrigins = new Set([
                            'https://discord.com',
                            'https://ptb.discord.com',
                            'https://canary.discord.com',
                            window.location.origin,
                        ]);
                        if (!['https:', 'http:'].includes(url.protocol)) return null;
                        if (!allowedOrigins.has(url.origin)) return null;
                        return url.toString();
                    } catch {
                        return null;
                    }
                }

                const safeReturnTo = getSafeReturnTo(returnTo);

                if (safeReturnTo) {
                    const deepLink = safeReturnTo.replace(/^http(s)?:\/\/(ptb\.|canary\.)?discord\.com/, 'discord://-');
                    let count = 5;
                    statusMsg.textContent = 'Redirecting in ' + count + ' seconds...';
                    const interval = setInterval(function () {
                        count--;
                        statusMsg.textContent = count > 0
                            ? 'Redirecting in ' + count + ' second' + (count !== 1 ? 's' : '') + '...'
                            : 'Redirecting...';
                        if (count <= 0) {
                            clearInterval(interval);
                            window.location.href = deepLink;
                            setTimeout(function () { window.location.href = safeReturnTo; }, 2500);
                        }
                    }, 1000);
                }
            })();
        </script>
    </div>

</body>

</html>
