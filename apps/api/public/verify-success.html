<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Successful | YUCP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="./tokens.css">
    <style>
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        h1 {
            font-family: "Plus Jakarta Sans", sans-serif;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .success-checkmark {
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
            position: relative;
            z-index: 10;
        }

        .check-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 1.5s ease-in-out forwards;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }

        .circle-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 1.2s ease-in-out forwards;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #ffffff;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

    <!-- ES Module Shims for better browser compatibility -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom": "https://esm.sh/react-dom@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "three": "https://esm.sh/three@0.160.0",
            "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.12?deps=three@0.160.0,react@18.2.0,react-dom@18.2.0",
            "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?deps=three@0.160.0,react@18.2.0,react-dom@18.2.0,@react-three/fiber@8.15.12",
            "holographic-sticker": "https://esm.sh/holographic-sticker@1.0.4?deps=react@18.2.0,react-dom@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="bg-canvas-root"
        style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -20; pointer-events: none;">
    </div>
    <!-- Playful Background Stickers -->
    <div id="holo-clapstars-0" class="absolute top-20 right-20 w-32 opacity-80 sticker pointer-events-auto z-0 h-32"
        style="animation-delay: -2s;"></div>
    <div id="holo-world-1" class="absolute bottom-20 left-10 w-24 opacity-60 sticker pointer-events-auto z-0 h-24"
        style="animation-delay: -5s;"></div>

    <main class="text-center max-w-2xl px-6 relative z-10">
        <div class="success-checkmark">
            <svg viewBox="0 0 100 100">
                <circle class="circle-path" cx="50" cy="50" r="45" stroke="#00e676" stroke-width="6" fill="none">
                </circle>
                <path class="check-path" d="M30 50 L45 65 L70 35" stroke="#00e676" stroke-width="6" fill="none"
                    stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </div>
        <h1 class="text-5xl md:text-6xl text-[#ffffff] mb-6 fade-up" style="animation-delay: 0.3s">
            You're verified!
        </h1>
        <p class="text-xl md:text-2xl text-[rgba(255,255,255,0.85)] mb-12 leading-relaxed fade-up"
            style="animation-delay: 0.5s">
            Your Discord account has been verified. Your roles will be updated shortly. You can return to Discord now.
        </p>
        <div class="fade-up" style="animation-delay: 0.7s">
            <a id="return-btn" href="#"
                class="action-btn inline-block px-12 py-5 rounded-full text-xl font-black uppercase tracking-widest no-underline">
                Return to Discord
            </a>
        </div>
        <div id="redirect-msg" class="mt-12 text-sm font-bold uppercase tracking-widest opacity-40 fade-up"
            style="animation-delay: 0.9s">
            Redirecting in 5 seconds...
        </div>
        <div id="close-msg" class="mt-12 text-sm font-bold uppercase tracking-widest opacity-40 fade-up"
            style="animation-delay: 0.9s; display: none;">
            You can close this tab.
        </div>
    </main>
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const returnTo = params.get('returnTo');
            const btn = document.getElementById('return-btn');
            const redirectMsg = document.getElementById('redirect-msg');
            const closeMsg = document.getElementById('close-msg');

            if (returnTo) {
                btn.href = returnTo;
                btn.textContent = 'Return to Discord';
                let count = 5;
                const interval = setInterval(function () {
                    count--;
                    redirectMsg.textContent = count > 0 ? 'Redirecting in ' + count + ' second' + (count !== 1 ? 's' : '') + '...' : 'Redirecting...';
                    if (count <= 0) {
                        clearInterval(interval);
                        window.location.href = returnTo;
                    }
                }, 1000);
            } else {
                btn.href = '#';
                btn.textContent = 'Close';
                btn.onclick = function () { window.close(); return false; };
                redirectMsg.style.display = 'none';
                closeMsg.style.display = 'block';
            }

            window.addEventListener('load', function () {
                if (typeof confetti === 'function') {
                    confetti({
                        particleCount: 150,
                        spread: 100,
                        origin: { y: 0.6 },
                        colors: ['#ffeb3b', '#0ea5e9', '#00e676', '#ffffff'],
                        disableForReducedMotion: true
                    });
                }
            });
        })();
    </script>

    <script type="text/babel" data-type="module">
        import React, { useRef, Component } from "react";
        import { createRoot } from "react-dom/client";
        import * as THREE from "three";
        import { Canvas, useFrame } from "@react-three/fiber";
        import { Clouds, Cloud, Sky as SkyImpl } from "@react-three/drei";
        import HolographicSticker from "holographic-sticker";

        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            componentDidCatch(error, errorInfo) { console.error("React Error Boundary caught an error", error, errorInfo); }
            render() { return this.state.hasError ? null : this.props.children; }
        }

        function MovingCloud({ startX, speed, bounds, color, volume, opacity, seed, y, z, growth, fade, segments, concentrate }) {
            const ref = useRef();
            useFrame((state) => {
                if (ref.current) {
                    const elapsed = state.clock.getElapsedTime();
                    const range = 240;
                    let currentX = startX - elapsed * speed;
                    currentX = ((currentX + 120) % range + range) % range - 120;
                    ref.current.position.x = currentX;
                }
            });
            return (
                <group ref={ref} position={[startX, y, z]}>
                    <Cloud bounds={bounds} color={color} volume={volume} opacity={opacity} seed={seed} growth={growth} fade={fade} segments={segments} concentrate={concentrate} position={[0, 0, 0]} />
                </group>
            );
        }

        function BackgroundSky() {
            return (
                <React.Fragment>
                    <SkyImpl sunPosition={[100, 20, 100]} turbidity={0.8} rayleigh={0.5} />
                    <Clouds material={THREE.MeshLambertMaterial} limit={4000} range={20}>
                        <MovingCloud startX={0} speed={1.5} bounds={[25, 6, 15]} color="#ffffff" volume={15} opacity={0.6} seed={1} y={0} z={-10} growth={4} fade={10} segments={20} />
                        <MovingCloud startX={30} speed={2.2} bounds={[10, 4, 10]} color="#eaebff" volume={6} opacity={0.4} seed={2} y={8} z={-20} growth={8} fade={20} segments={10} />
                        <MovingCloud startX={-20} speed={0.5} bounds={[60, 5, 40]} color="#d3e2ff" volume={40} opacity={0.9} seed={3} y={-5} z={-35} growth={2} fade={30} segments={40} concentrate="outside" />
                        <MovingCloud startX={-45} speed={1.0} bounds={[30, 20, 30]} color="#fdfdfd" volume={35} opacity={0.7} seed={5} y={5} z={-25} growth={6} fade={15} segments={35} concentrate="random" />
                    </Clouds>
                </React.Fragment>
            )
        }

        function ForegroundSky() {
            return (
                <React.Fragment>
                    <Clouds material={THREE.MeshLambertMaterial} limit={4000} range={20}>
                        <MovingCloud startX={45} speed={2.8} bounds={[10, 10, 5]} color="#f0f0f0" volume={12} opacity={0.8} seed={4} y={2} z={10} growth={15} fade={5} segments={15} concentrate="inside" />
                        <MovingCloud startX={15} speed={3.5} bounds={[20, 5, 8]} color="#ffffff" volume={8} opacity={0.6} seed={6} y={-2} z={5} growth={5} fade={25} segments={12} />
                    </Clouds>
                </React.Fragment>
            )
        }

        function BackgroundApp() {
            return (
                <ErrorBoundary>
                    <Canvas camera={{ position: [0, -5, 15], fov: 60 }} gl={{ alpha: false }}>
                        <BackgroundSky />
                        <ambientLight intensity={Math.PI / 1.5} />
                        <directionalLight position={[10, 20, 10]} intensity={1.5} color="#ffffff" />
                        <spotLight position={[-20, 0, 10]} color="#ffdddd" angle={0.8} decay={0} penumbra={1} intensity={10} />
                    </Canvas>
                </ErrorBoundary>
            )
        }

        function ForegroundApp() {
            return (
                <ErrorBoundary>
                    <Canvas camera={{ position: [0, -5, 15], fov: 60 }} gl={{ alpha: true }} style={{ pointerEvents: 'none' }}>
                        <ForegroundSky />
                        <ambientLight intensity={Math.PI / 1.5} />
                        <directionalLight position={[10, 20, 10]} intensity={1.5} color="#ffffff" />
                    </Canvas>
                </ErrorBoundary>
            )
        }

        const bgRoot = createRoot(document.getElementById('bg-canvas-root'));
        bgRoot.render(<BackgroundApp />);

        // Holographic Stickers
        const HoloWrapper = ({ src, alt }) => (
            <HolographicSticker.Root>
                <HolographicSticker.Scene>
                    <HolographicSticker.Card className="w-full h-full rounded-2xl bg-transparent border-none overflow-visible">
                        <HolographicSticker.ImageLayer src={src} alt={alt} objectFit="contain" />
                        <HolographicSticker.Pattern
                            maskUrl={src}
                            maskSize="contain"
                            textureUrl="https://assets.codepen.io/605876/figma-texture.png"
                            textureSize="300px"
                            mixBlendMode="hard-light"
                            opacity={0.6}>
                            <HolographicSticker.Refraction intensity={2.5} />
                        </HolographicSticker.Pattern>
                    </HolographicSticker.Card>
                </HolographicSticker.Scene>
            </HolographicSticker.Root>
        );

        const root_holo_clapstars_0 = document.getElementById("holo-clapstars-0");
        if (root_holo_clapstars_0) {
            createRoot(root_holo_clapstars_0).render(<HoloWrapper src="./Icons/ClapStars.png" alt="Clap" />);
        }
        const root_holo_world_1 = document.getElementById("holo-world-1");
        if (root_holo_world_1) {
            createRoot(root_holo_world_1).render(<HoloWrapper src="./Icons/World.png" alt="World" />);
        }
    </script>
</body>

</html>
