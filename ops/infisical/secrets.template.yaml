# Infisical Secrets Template
# =========================
# This file documents all required secrets with placeholder values.
# DO NOT store actual secrets here - copy to Infisical directly.
#
# Environment: dev | preview | prod
# Project: gumroad-{env}

# =============================================================================
# Discord Bot Secrets (/bot/discord/)
# =============================================================================

bot:
  discord:
    # Bot token from Discord Developer Portal → Bot → Token
    # Rotation: On compromise / 90 days
    DISCORD_BOT_TOKEN: "placeholder_bot_token_from_discord"

    # OAuth Client ID (public, can be committed)
    # Rotation: Never
    DISCORD_CLIENT_ID: "123456789012345678"

    # OAuth Client Secret from Discord Developer Portal → OAuth2
    # Rotation: On compromise / 90 days
    DISCORD_CLIENT_SECRET: "placeholder_oauth_secret_from_discord"

    # Public key for interaction endpoint verification
    # Rotation: On compromise
    DISCORD_PUBLIC_KEY: "placeholder_public_key_hex"

# =============================================================================
# API Authentication Secrets (/api/auth/)
# =============================================================================

api:
  auth:
    # Session signing key for Better Auth (JWT / session cookies only)
    # Generate: openssl rand -base64 32
    # Rotation: On compromise / 180 days (invalidates all sessions)
    BETTER_AUTH_SECRET: "placeholder_32_byte_base64_secret"

    # Dedicated key for encrypting stored provider credentials (envelope encryption KEK)
    # MUST be different from BETTER_AUTH_SECRET
    # MIGRATION: When first set, re-encrypt all stored provider credentials.
    # Generate: openssl rand -base64 32
    # Rotation: On compromise / 365 days (requires credential re-encryption)
    ENCRYPTION_SECRET: "placeholder_32_byte_base64_secret"

    # Optional dedicated key for verification support-code encryption
    # If omitted, BETTER_AUTH_SECRET is used as the fallback.
    # Generate: openssl rand -base64 32
    ERROR_REFERENCE_SECRET: "placeholder_32_byte_base64_secret"

    discord:
      # Same as bot.discord but for API OAuth
      DISCORD_CLIENT_ID: "123456789012345678"
      DISCORD_CLIENT_SECRET: "placeholder_oauth_secret_from_discord"

# =============================================================================
# Database Secrets (/api/database/)
# =============================================================================

  database:
    # PostgreSQL connection string for Better Auth
    # Format: postgresql://user:password@host:port/database
    # Rotation: On credential change
    DATABASE_URL: "postgresql://user:placeholder_password@localhost:5432/gumroad_auth"

# =============================================================================
# Integration Secrets (/api/integrations/)
# =============================================================================

  integrations:
    gumroad:
      # OAuth Client ID (public)
      # Rotation: Never
      GUMROAD_CLIENT_ID: "placeholder_gumroad_client_id"

      # OAuth Client Secret from Gumroad Settings → Advanced
      # Rotation: On compromise / 90 days
      GUMROAD_CLIENT_SECRET: "placeholder_gumroad_client_secret"

    jinxxy:
      # API key from Jinxxy dashboard
      # Rotation: On compromise / 90 days
      JINXXY_API_KEY: "placeholder_jinxxy_api_key"

  email:
    # Resend API key from resend.com
    # Rotation: On compromise / 90 days
    RESEND_API_KEY: "re_placeholder_from_resend_dashboard"

    # From address for transactional emails (e.g. Creator Assistant <noreply@yourdomain.com>)
    # Must use a verified domain in Resend
    EMAIL_FROM: "Creator Assistant <noreply@yourdomain.com>"

# =============================================================================
# Infrastructure Secrets (/infra/)
# =============================================================================


infra:
  urls:
    BETTER_AUTH_URL: ""
    FRONTEND_URL: ""
    API_BASE_URL: ""    
    API_INTERNAL_URL: ""

  convex:
    # Convex deployment URL (semi-public)
    # Rotation: Never
    CONVEX_URL: "https://placeholder-deployment.convex.cloud"

    # Full deploy key from Convex Dashboard → Settings → URL and deploy key
    # Format: dev:xxx|eyJ... or prod:xxx|eyJ... (copy the entire string)
    # Required for sync:convex:env (Infisical → Convex env sync on dev:infisical)
    # Rotation: On compromise / 90 days
    CONVEX_DEPLOY_KEY: "dev:team:project|eyJ_placeholder_full_deploy_key"

    # API base URL for backfill (Convex dev calls this to fetch past purchases)
    # Dev: Tailscale Funnel URL (e.g. https://machine-name.tailnet-name.ts.net) - run `tailscale funnel 3001` first
    # Prod: Production API URL (e.g. https://api.yourdomain.com)
    BACKFILL_API_URL: "https://your-machine.tailnet-name.ts.net"

    # Prod-only: use CONVEX_URL_PROD, CONVEX_DEPLOY_KEY_PROD, BACKFILL_API_URL_PROD for sync:convex:env:prod
    CONVEX_URL_PROD: "https://prod-deployment.convex.cloud"
    CONVEX_DEPLOY_KEY_PROD: "prod:team:project|eyJ_placeholder_prod_deploy_key"
    BACKFILL_API_URL_PROD: "https://api.yourdomain.com"

  observability:
    # Public ingest key for HyperDX browser/session-replay SDKs.
    # Treat as low-sensitivity config, but still store centrally for consistency.
    HYPERDX_API_KEY: "placeholder_hyperdx_public_ingest_key"

    # Local or hosted HyperDX UI URL. Local default is http://localhost:8080.
    HYPERDX_APP_URL: "http://localhost:8080"

    # OTLP collector endpoints for local or hosted HyperDX.
    HYPERDX_OTLP_HTTP_URL: "http://localhost:4318"
    HYPERDX_OTLP_GRPC_URL: "localhost:4317"

    # Default OTLP exporter endpoint for local SDK wiring.
    OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4318"

    # Optional explicit OTLP auth headers override for API/bot.
    # Usually left unset because the apps derive Authorization=<HYPERDX_API_KEY> automatically.
    OTEL_EXPORTER_OTLP_HEADERS: ""

  signing:
    # Shared bearer secret for service-to-service API proxying and Tempo RPC.
    # Required in preview/prod. Local development can omit it because web, api,
    # and bot share a built-in development-only fallback.
    # Generate: openssl rand -base64 32
    # Rotation: On compromise / 90 days
    INTERNAL_RPC_SHARED_SECRET: "placeholder_internal_rpc_shared_secret"

    # Webhook signing secret for signature verification
    # Generate: openssl rand -hex 32
    # Rotation: On compromise / 90 days
    WEBHOOK_SIGNING_SECRET: "placeholder_webhook_signing_secret_hex"

  coupling:
    # Private coupling forensics scan service base URL.
    # This must point at the separately deployed private coupling service, not the public API.
    # Example: https://coupling.internal.yourdomain.com
    # Rotation: On topology or host change
    YUCP_COUPLING_SERVICE_BASE_URL: "https://coupling.internal.yourdomain.com"

    # Shared bearer secret between the public API and the private coupling scan service.
    # Generate: openssl rand -base64 32
    # Rotation: On compromise / 90 days
    YUCP_COUPLING_SERVICE_SHARED_SECRET: "placeholder_coupling_service_shared_secret"

# =============================================================================
# YUCP Package Signing Secrets (/yucp/signing/)
# =============================================================================

yucp:
  signing:
    # Ed25519 private key for the YUCP Certificate Authority root key.
    # This is the root of trust for all creator certificates.
    # Generate: openssl genpkey -algorithm ed25519 | openssl pkey -text -noout
    #   or use: node -e "const {generateKeyPairSync}=require('crypto'); const {privateKey}=generateKeyPairSync('ed25519',{privateKeyEncoding:{type:'pkcs8',format:'der'}}); console.log(privateKey.toString('base64'))"
    # Rotation: NEVER — rotating invalidates all issued certificates.
    #   To rotate: issue new root, revoke old certs, re-issue to creators.
    YUCP_ROOT_PRIVATE_KEY: "placeholder_base64_ed25519_private_key"

    # Stable identifier for the root key (used in certificate keyId field).
    # Increment only when rotating the root key (e.g. yucp-root-2025 → yucp-root-2026).
    # Rotation: Only when YUCP_ROOT_PRIVATE_KEY changes.
    YUCP_KEY_ID: "yucp-root-2025"

# =============================================================================
# Environment-Specific Notes
# =============================================================================

# DEV Environment:
# - Use Discord test application
# - Use local Postgres or dev database
# - Convex dev deployment
# - Can use weaker secrets for testing

# PREVIEW Environment:
# - Use Discord test application
# - Use staging database
# - Convex preview deployment
# - Production-like secret strength

# PROD Environment:
# - Use Discord production application
# - Use production database with strong credentials
# - Convex production deployment
# - Maximum secret strength required
# - Enable all audit logging
