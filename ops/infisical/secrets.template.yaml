# Infisical Secrets Template
# =========================
# This file documents all required secrets with placeholder values.
# DO NOT store actual secrets here - copy to Infisical directly.
#
# Environment: dev | preview | prod
# Project: gumroad-{env}

# =============================================================================
# Discord Bot Secrets (/bot/discord/)
# =============================================================================

bot:
  discord:
    # Bot token from Discord Developer Portal → Bot → Token
    # Rotation: On compromise / 90 days
    DISCORD_BOT_TOKEN: "placeholder_bot_token_from_discord"

    # OAuth Client ID (public, can be committed)
    # Rotation: Never
    DISCORD_CLIENT_ID: "123456789012345678"

    # OAuth Client Secret from Discord Developer Portal → OAuth2
    # Rotation: On compromise / 90 days
    DISCORD_CLIENT_SECRET: "placeholder_oauth_secret_from_discord"

    # Public key for interaction endpoint verification
    # Rotation: On compromise
    DISCORD_PUBLIC_KEY: "placeholder_public_key_hex"

# =============================================================================
# API Authentication Secrets (/api/auth/)
# =============================================================================

api:
  auth:
    # Session encryption key for Better Auth
    # Generate: openssl rand -base64 32
    # Rotation: On compromise / 180 days (invalidates all sessions)
    BETTER_AUTH_SECRET: "placeholder_32_byte_base64_secret"

    discord:
      # Same as bot.discord but for API OAuth
      DISCORD_CLIENT_ID: "123456789012345678"
      DISCORD_CLIENT_SECRET: "placeholder_oauth_secret_from_discord"

# =============================================================================
# Database Secrets (/api/database/)
# =============================================================================

  database:
    # PostgreSQL connection string for Better Auth
    # Format: postgresql://user:password@host:port/database
    # Rotation: On credential change
    DATABASE_URL: "postgresql://user:placeholder_password@localhost:5432/gumroad_auth"

# =============================================================================
# Integration Secrets (/api/integrations/)
# =============================================================================

  integrations:
    gumroad:
      # OAuth Client ID (public)
      # Rotation: Never
      GUMROAD_CLIENT_ID: "placeholder_gumroad_client_id"

      # OAuth Client Secret from Gumroad Settings → Advanced
      # Rotation: On compromise / 90 days
      GUMROAD_CLIENT_SECRET: "placeholder_gumroad_client_secret"

    jinxxy:
      # API key from Jinxxy dashboard
      # Rotation: On compromise / 90 days
      JINXXY_API_KEY: "placeholder_jinxxy_api_key"

# =============================================================================
# Infrastructure Secrets (/infra/)
# =============================================================================


infra:
  urls:
    BETTER_AUTH_URL: ""
    FRONTEND_URL: ""
    API_BASE_URL: ""    
    API_INTERNAL_URL: ""

  convex:
    # Convex deployment URL (semi-public)
    # Rotation: Never
    CONVEX_URL: "https://placeholder-deployment.convex.cloud"

    # Full deploy key from Convex Dashboard → Settings → URL and deploy key
    # Format: dev:xxx|eyJ... or prod:xxx|eyJ... (copy the entire string)
    # Required for sync:convex:env (Infisical → Convex env sync on dev:infisical)
    # Rotation: On compromise / 90 days
    CONVEX_DEPLOY_KEY: "dev:team:project|eyJ_placeholder_full_deploy_key"

    # API base URL for backfill (Convex dev calls this to fetch past purchases)
    # Dev: Tailscale Funnel URL (e.g. https://machine-name.tailnet-name.ts.net) - run `tailscale funnel 3001` first
    # Prod: Production API URL (e.g. https://api.yourdomain.com)
    BACKFILL_API_URL: "https://your-machine.tailnet-name.ts.net"

    # Prod-only: use CONVEX_URL_PROD, CONVEX_DEPLOY_KEY_PROD, BACKFILL_API_URL_PROD for sync:convex:env:prod
    CONVEX_URL_PROD: "https://prod-deployment.convex.cloud"
    CONVEX_DEPLOY_KEY_PROD: "prod:team:project|eyJ_placeholder_prod_deploy_key"
    BACKFILL_API_URL_PROD: "https://api.yourdomain.com"

  signing:
    # Webhook signing secret for signature verification
    # Generate: openssl rand -hex 32
    # Rotation: On compromise / 90 days
    WEBHOOK_SIGNING_SECRET: "placeholder_webhook_signing_secret_hex"

# =============================================================================
# Environment-Specific Notes
# =============================================================================

# DEV Environment:
# - Use Discord test application
# - Use local Postgres or dev database
# - Convex dev deployment
# - Can use weaker secrets for testing

# PREVIEW Environment:
# - Use Discord test application
# - Use staging database
# - Convex preview deployment
# - Production-like secret strength

# PROD Environment:
# - Use Discord production application
# - Use production database with strong credentials
# - Convex production deployment
# - Maximum secret strength required
# - Enable all audit logging
